set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"
set -g mouse on
set -g focus-events on

# Make Tmux-bar stay on top
set -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
# Make tmux split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Add ctrl+hjkl movement
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Add alt+hjkl resizing
bind -n C-M-h resize-pane -L 2
bind -n C-M-j resize-pane -D 2
bind -n C-M-k resize-pane -U 2
bind -n C-M-l resize-pane -R 2

# Add tab movement
bind-key -n M-l previous-window
bind-key -n M-h next-window

# 2. Enable Vi mode (Actually add the keys this time)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

setw -g aggressive-resize on

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Dracula Config
set -g @plugin 'dracula/tmux'
# set -g @dracula-plugins 'cpu-usage ram-usage weather time battery'
set -g @dracula-show-powerline false
set -g @dracula-show-fahrenheit false
# set -g @dracula-show-battery-status true
# set -g @dracula-battery-label "♥ "
set -g @dracula-day-month false
set -g @dracula-military-time true
# set -g @dracula-fixed-location "Oslo"
set -g @dracula-show-location false

set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
